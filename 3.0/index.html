<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>次のお出かけ先 投票</title>
    <style>
        :root {
            --primary-color: #ff8c00; /* Dark Orange */
            --accent-color: #ffcc00;  /* Bright Gold/Yellow */
            --bg-color: #fffde7;      /* Very Light Yellow */
            --card-bg: #ffffff;
            --text-color: #4e342e;    /* Dark Brown for better contrast */
        }

        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 600px;
            background: var(--card-bg);
            padding: 2.5rem;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(255, 140, 0, 0.15);
            border: 3px solid var(--accent-color);
        }

        header {
            text-align: center;
            margin-bottom: 2rem;
        }

        h1 {
            margin: 0;
            color: var(--primary-color);
            font-size: 2rem;
            letter-spacing: -0.5px;
        }

        .total-message {
            background-color: var(--accent-color);
            color: #4e342e;
            display: inline-block;
            padding: 0.6rem 1.8rem;
            border-radius: 50px;
            font-weight: bold;
            margin-top: 1.2rem;
            box-shadow: 0 4px 0 #e6b800;
        }

        .vote-list {
            display: grid;
            gap: 1.2rem;
            margin-top: 1.5rem;
        }

        .vote-card {
            border: 2px solid #fff9c4;
            border-radius: 16px;
            padding: 1.2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background: #fff;
        }

        .vote-card:hover {
            border-color: var(--primary-color);
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(255, 140, 0, 0.2);
        }

        .destination-info h2 {
            margin: 0;
            font-size: 1.3rem;
        }

        .vote-info {
            font-weight: bold;
            font-size: 1.2rem;
            margin-right: 1rem;
            color: var(--primary-color);
        }

        .vote-button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 0.7rem 1.4rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            transition: background-color 0.2s, transform 0.1s;
            box-shadow: 0 3px 0 #d35400;
        }

        .vote-button:hover {
            background-color: #e67e22;
        }

        .vote-button:active {
            transform: translateY(2px);
            box-shadow: none;
        }

        .vote-button:disabled {
            background-color: #ccc;
            box-shadow: none;
            cursor: not-allowed;
        }

        footer {
            margin-top: 2.5rem;
            text-align: center;
            border-top: 1px dashed var(--accent-color);
            padding-top: 1.5rem;
        }

        #reset-votes {
            background: none;
            border: 1px solid #ddd;
            color: #999;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
        }

        #reset-votes:hover {
            background-color: #fff5e6;
            color: var(--primary-color);
            border-color: var(--primary-color);
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>次のお出かけ先 投票</h1>
        <div id="total-display" class="total-message">集計中...</div>
        <p style="margin-top: 1rem;">次のお休みはどこに行きたいですか？</p>
    </header>

    <main>
        <div class="vote-list">
            <section class="vote-card" data-id="onsen">
                <div class="destination-info">
                    <h2>温泉 ♨️</h2>
                </div>
                <div style="display: flex; align-items: center;">
                    <div class="vote-info">
                        <span class="count">0</span> 票
                    </div>
                    <button class="vote-button">投票する</button>
                </div>
            </section>

            <section class="vote-card" data-id="camping">
                <div class="destination-info">
                    <h2>キャンプ 🏕️</h2>
                </div>
                <div style="display: flex; align-items: center;">
                    <div class="vote-info">
                        <span class="count">0</span> 票
                    </div>
                    <button class="vote-button">投票する</button>
                </div>
            </section>

            <section class="vote-card" data-id="aquarium">
                <div class="destination-info">
                    <h2>水族館 🐬</h2>
                </div>
                <div style="display: flex; align-items: center;">
                    <div class="vote-info">
                        <span class="count">0</span> 票
                    </div>
                    <button class="vote-button">投票する</button>
                </div>
            </section>

            <section class="vote-card" data-id="shopping">
                <div class="destination-info">
                    <h2>ショッピング 🛍️</h2>
                </div>
                <div style="display: flex; align-items: center;">
                    <div class="vote-info">
                        <span class="count">0</span> 票
                    </div>
                    <button class="vote-button">投票する</button>
                </div>
            </section>
        </div>
    </main>

    <footer>
        <button id="reset-votes">投票をリセット</button>
    </footer>
</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const voteButtons = document.querySelectorAll('.vote-button');
        const resetButton = document.getElementById('reset-votes');
        const totalDisplay = document.getElementById('total-display');

        async function refreshVotes() {
            try {
                const response = await fetch('/votes');
                const votes = await response.json();

                document.querySelectorAll('.count').forEach(span => span.textContent = '0');

                let totalCount = 0;
                votes.forEach(item => {
                    const card = document.querySelector('.vote-card[data-id="' + item.option + '"]');
                    if (card) {
                        card.querySelector('.count').textContent = item.count;
                        totalCount += item.count;
                    }
                });

                totalDisplay.textContent = '現在、合計 ' + totalCount + ' 票集まっています！';
            } catch (error) {
                console.error('投票の取得に失敗しました:', error);
                totalDisplay.textContent = 'エラーが発生しました';
            }
        }

        refreshVotes();

        voteButtons.forEach(button => {
            button.addEventListener('click', async (e) => {
                const card = e.target.closest('.vote-card');
                const optionId = card.dataset.id;
                
                button.disabled = true;

                try {
                    const response = await fetch('/vote', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ option: optionId })
                    });

                    if (response.ok) {
                        await refreshVotes();
                    }
                } catch (error) {
                    console.error('通信エラー:', error);
                } finally {
                    button.disabled = false;
                }
            });
        });

        resetButton.addEventListener('click', () => {
            alert('サーバー側のリセット機能は未実装です。');
        });
    });
</script>

</body>
</html>
